    <rect class="box" x="0" y="0" width="240" height="130"/>
    <rect x="25" y="32" width="42" height="38" rx="8" class="aws"/>
    <path d="M25 60h42M46 32v38" class="icon-line"/>
    <text x="82" y="56" class="label">SQS</text>
    <text x="82" y="81" class="small">Async Queue</text>
  </g>

  <g transform="translate(590,760)">
    <rect class="box" x="0" y="0" width="240" height="130"/>
    <path d="M36 38h30l8 10v26H36z" class="aws"/>
    <path d="M36 74h38" class="icon-line"/>
    <text x="88" y="56" class="label">S3</text>
    <text x="88" y="81" class="small">Audio / Analysis Files</text>
  </g>

  <g transform="translate(880,760)">
    <rect class="box" x="0" y="0" width="260" height="130"/>
    <rect x="27" y="32" width="44" height="44" rx="8" class="aws"/>
    <path d="M35 54h28M49 40v28" class="icon-line"/>
    <text x="88" y="56" class="label">Secrets Manager</text>
    <text x="88" y="81" class="small">OpenAI API Key</text>
  </g>

  <g transform="translate(1180,760)">
    <rect class="box" x="0" y="0" width="250" height="130"/>
    <circle cx="43" cy="53" r="22" class="aws"/>
    <path d="M27 53h32M43 37v32" class="icon-line"/>
    <text x="82" y="56" class="label">CloudWatch</text>
    <text x="82" y="81" class="small">Logs / Metrics</text>
  </g>

  <g transform="translate(1460,550)">
    <rect class="box" x="0" y="0" width="180" height="145"/>
    <rect x="20" y="34" width="38" height="38" rx="7" class="aws"/>
    <path d="M20 72h38" class="icon-line"/>
    <text x="68" y="56" class="label">ECR</text>
    <text x="68" y="81" class="small">Images</text>
  </g>

  <g transform="translate(1460,760)">
    <rect class="box" x="0" y="0" width="180" height="130"/>
    <rect x="20" y="30" width="38" height="38" rx="7" class="aws"/>
    <path d="M20 68h38" class="icon-line"/>
    <text x="68" y="52" class="label">GitHub Actions</text>
    <text x="68" y="78" class="small">CI/CD</text>
  </g>

  <path class="edge" d="M220 310 L270 325"/>
  <path class="edge" d="M480 325 L540 325"/>
  <path class="edge" d="M770 325 L840 325"/>
  <path class="edge" d="M1090 325 L1160 325"/>
  <path class="edge" d="M960 395 L430 560"/>
  <path class="edge" d="M430 725 L430 760"/>
  <path class="edge" d="M570 640 L620 640"/>
  <path class="edge" d="M570 610 L920 620"/>
  <path class="edge" d="M570 660 L1170 620"/>
  <path class="edge" d="M570 700 L590 790"/>
  <path class="edge" d="M870 640 L920 640"/>
  <path class="edge" d="M870 675 L590 810"/>
  <path class="edge" d="M870 700 L1180 790"/>
  <path class="edge" d="M870 625 L880 810"/>
  <path class="edge" d="M1550 760 L1550 695"/>
  <path class="edge" d="M1460 620 L570 610"/>

  <text x="1280" y="220" class="small">Legend: Orange icons = AWS resources</text>
