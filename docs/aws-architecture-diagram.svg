    <text x="82" y="77" class="small">Outbound Internet</text>
  </g>

  <g transform="translate(290,560)">
    <rect class="box" x="0" y="0" width="280" height="165"/>
    <rect x="26" y="36" width="48" height="38" rx="8" class="aws"/>
