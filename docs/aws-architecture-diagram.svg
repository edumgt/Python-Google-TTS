    <ellipse cx="42" cy="58" rx="22" ry="16" class="aws"/>
    <path d="M24 58h36M42 44v28" class="icon-line"/>
    <text x="78" y="56" class="label">RDS</text>
    <text x="78" y="81" class="small">PostgreSQL</text>
  </g>

  <g transform="translate(1170,550)">
    <rect class="box" x="0" y="0" width="220" height="145"/>
    <rect x="25" y="34" width="38" height="44" rx="7" class="aws"/>
    <path d="M25 58h38M44 34v44" class="icon-line"/>
    <text x="78" y="56" class="label">ElastiCache</text>
    <text x="78" y="81" class="small">Redis</text>
  </g>

