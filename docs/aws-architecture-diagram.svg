<svg xmlns="http://www.w3.org/2000/svg" width="1680" height="980" viewBox="0 0 1680 980" role="img" aria-labelledby="title desc">
  <title id="title">Voice Analyzer AWS Architecture</title>
  <desc id="desc">AWS deployment architecture diagram for Django + FastAPI Voice Analyzer with visible resource icons.</desc>
  <defs>
    <style>
      .title { font: 700 30px 'Segoe UI', Arial, sans-serif; fill: #0f172a; }
      .subtitle { font: 500 16px 'Segoe UI', Arial, sans-serif; fill: #334155; }
      .label { font: 600 16px 'Segoe UI', Arial, sans-serif; fill: #0f172a; }
      .small { font: 500 13px 'Segoe UI', Arial, sans-serif; fill: #334155; }
      .zone { fill: #f8fafc; stroke: #94a3b8; stroke-width: 2; stroke-dasharray: 8 6; }
      .box { fill: #ffffff; stroke: #475569; stroke-width: 2; rx: 18; ry: 18; }
      .edge { stroke: #1e293b; stroke-width: 2.5; fill: none; marker-end: url(#arrow); }
      .aws { fill: #ff9900; }
      .icon-line { stroke: #0f172a; stroke-width: 2.2; fill: none; stroke-linecap: round; stroke-linejoin: round; }
    </style>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#1e293b"/>
    </marker>
  </defs>

  <rect x="0" y="0" width="1680" height="980" fill="#eef2ff"/>
  <text x="50" y="60" class="title">AI Django + FastAPI Voice Analyzer - AWS Architecture</text>
  <text x="50" y="90" class="subtitle">Production-ready deployment with ECS Fargate, data stores, queue, and observability</text>

  <rect x="180" y="150" width="1260" height="760" class="zone"/>
  <text x="210" y="190" class="label">VPC (Multi-AZ)</text>

  <rect x="220" y="220" width="1240" height="210" class="zone"/>
  <text x="250" y="255" class="label">Public Subnet</text>

  <rect x="220" y="470" width="1240" height="400" class="zone"/>
  <text x="250" y="505" class="label">Private Subnet</text>

  <g transform="translate(40,250)">
    <rect class="box" x="0" y="0" width="180" height="120"/>
    <circle cx="45" cy="45" r="24" class="aws"/>
    <path d="M30 45h30M45 30v30" class="icon-line"/>
    <text x="90" y="45" class="label">User</text>
    <text x="90" y="70" class="small">Client</text>
  </g>

  <g transform="translate(270,260)">
    <rect class="box" x="0" y="0" width="210" height="130"/>
    <rect x="22" y="25" width="42" height="42" rx="8" class="aws"/>
    <path d="M30 45h26M43 32v26" class="icon-line"/>
    <text x="78" y="47" class="label">Route 53</text>
    <text x="78" y="72" class="small">DNS</text>
  </g>

  <g transform="translate(540,260)">
    <rect class="box" x="0" y="0" width="230" height="130"/>
    <circle cx="42" cy="46" r="22" class="aws"/>
    <path d="M24 46h36M42 28v36" class="icon-line"/>
    <text x="78" y="47" class="label">CloudFront</text>
    <text x="78" y="72" class="small">CDN + TLS</text>
  </g>

  <g transform="translate(840,250)">
    <rect class="box" x="0" y="0" width="250" height="145"/>
    <rect x="24" y="30" width="40" height="34" rx="7" class="aws"/>
    <path d="M22 72h44M30 84h28" class="icon-line"/>
