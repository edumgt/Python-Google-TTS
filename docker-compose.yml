services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: repo-voice-analyzer
    ports:
      - "8000:8000"
    environment:
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      OPENAI_ANALYSIS_MODEL: ${OPENAI_ANALYSIS_MODEL:-gpt-4o-mini}
      OPENAI_TTS_MODEL: ${OPENAI_TTS_MODEL:-gpt-4o-mini-tts}
      OPENAI_TTS_VOICE: ${OPENAI_TTS_VOICE:-alloy}
      DJANGO_SECRET_KEY: ${DJANGO_SECRET_KEY:-change-this-secret-key}
      DJANGO_DEBUG: ${DJANGO_DEBUG:-true}
      DJANGO_ALLOWED_HOSTS: ${DJANGO_ALLOWED_HOSTS:-*}
      APP_TIME_ZONE: ${APP_TIME_ZONE:-Asia/Seoul}
    volumes:
      - ./media:/app/media
      - ./workspace_repos:/app/workspace_repos
    restart: unless-stopped
